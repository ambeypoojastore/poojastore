<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambey Pooja Store - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B3A3A;
            --primary-dark: #6B2A2A;
            --accent: #D4AF37;
            --light: #F5F1E8;
            --dark: #2C2C2C;
            --success: #27AE60;
            --danger: #E74C3C;
            --warning: #F39C12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8e3d8 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-actions a, .header-actions button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .header-actions a:hover, .header-actions button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .container {
            display: flex;
            min-height: calc(100vh - 80px);
        }

        .sidebar {
            width: 260px;
            background: white;
            padding: 30px 20px;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.08);
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            margin: 25px 0 12px;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            margin-bottom: 8px;
        }

        .sidebar button {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            color: #555;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
        }

        .sidebar button:hover {
            background: #f0f0f0;
            color: var(--primary);
        }

        .sidebar button.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            font-weight: 600;
        }

        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 700;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            padding: 11px 22px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 58, 58, 0.3);
        }

        .btn-secondary {
            background: #e8e8e8;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d8d8d8;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 11px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 58, 58, 0.1);
            background: #fafafa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f8f8f8;
            padding: 14px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid #ddd;
            color: var(--primary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-color: #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-color: #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-color: #bee5eb;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 10px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .modal-header h3 {
            color: var(--primary);
            font-size: 20px;
        }

        .close-btn {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
            background: none;
            border: none;
            padding: 0;
            width: auto;
        }

        .close-btn:hover {
            color: #333;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            padding: 8px 14px;
            font-size: 12px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 58, 58, 0.2);
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                display: flex;
                overflow-x: auto;
                padding: 15px;
            }

            .sidebar h3 {
                display: none;
            }

            .main {
                padding: 20px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🙏 AMBEY POOJA STORE</h1>
        <div class="header-actions">
            <a href="../index.html" target="_blank">View Store ↗</a>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3>Menu</h3>
            <ul>
                <li><button class="menu-btn active" onclick="showSection('dashboard')">📊 Dashboard</button></li>
                <li><button class="menu-btn" onclick="showSection('products')">📦 Products</button></li>
                <li><button class="menu-btn" onclick="showSection('settings')">⚙️ Settings</button></li>
            </ul>
        </div>

        <div class="main">
            <!-- DASHBOARD -->
            <div id="dashboard" class="section active">
                <h2>Dashboard</h2>
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Products</div>
                        <div class="stat-number" id="totalProducts">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Products</div>
                        <div class="stat-number" id="activeProducts">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Low Stock Items</div>
                        <div class="stat-number" id="lowStockItems">0</div>
                    </div>
                </div>
            </div>

            <!-- PRODUCTS -->
            <div id="products" class="section">
                <h2>Products</h2>
                <div id="alertBox"></div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="openAddModal()">➕ Add Product</button>
                    <button class="btn-secondary" onclick="reloadProducts()">🔄 Refresh</button>
                </div>

                <div class="card">
                    <table id="productsTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody">
                            <tr><td colspan="6" style="text-align: center; padding: 40px;"><span class="loading"></span> Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- SETTINGS -->
            <div id="settings" class="section">
                <h2>Settings</h2>
                <div class="card">
                    <h3 style="margin-bottom: 20px;">Store Information</h3>
                    <form onsubmit="saveSettings(event)">
                        <div class="form-group">
                            <label>Store Name</label>
                            <input type="text" id="storeName" value="Ambey Pooja Store">
                        </div>
                        <div class="form-group">
                            <label>GitHub Repository URL</label>
                            <input type="text" id="repoUrl" placeholder="https://github.com/username/ambeypoojastore">
                        </div>
                        <div class="form-group">
                            <label>Admin Password</label>
                            <input type="password" id="adminPassword" placeholder="Change admin password">
                        </div>
                        <button type="submit" class="btn-primary">💾 Save Settings</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD/EDIT PRODUCT MODAL -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add Product</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="productForm" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="productCategory">
                        <option>Pooja Items</option>
                        <option>Incense & Oils</option>
                        <option>Decorations</option>
                        <option>Flowers</option>
                        <option>Lamps</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="productImage" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Stock Quantity *</label>
                    <input type="number" id="productStock" value="0" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="productStatus">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">✅ Save Product</button>
            </form>
        </div>
    </div>

    <script>
        // ========== CONFIG ==========
        const GITHUB_REPO = 'your-username/ambeypoojastore'; // Change this!
        const GITHUB_TOKEN = localStorage.getItem('githubToken') || ''; // Will be set in settings
        const PRODUCTS_PATH = 'poojastore/products.json';
        let productsData = { products: [] };
        let currentEditId = null;

        // ========== SESSION ==========
        function checkSession() {
            const session = localStorage.getItem('adminSession');
            if (!session) {
                window.location.href = 'login.html';
            }
        }

        function logout() {
            localStorage.removeItem('adminSession');
            window.location.href = 'login.html';
        }

        // ========== NAVIGATION ==========
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');

            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (sectionId === 'dashboard') {
                loadDashboard();
            } else if (sectionId === 'products') {
                loadProducts();
            }
        }

        // ========== DASHBOARD ==========
        async function loadDashboard() {
            await loadProducts();
            const products = productsData.products || [];
            document.getElementById('totalProducts').textContent = products.length;

            const active = products.filter(p => p.status === 'Active').length;
            document.getElementById('activeProducts').textContent = active;

            const lowStock = products.filter(p => p.stock < 10).length;
            document.getElementById('lowStockItems').textContent = lowStock;
        }

        // ========== PRODUCTS ==========
        async function loadProducts() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${PRODUCTS_PATH}`);
                if (response.ok) {
                    productsData = await response.json();
                } else {
                    productsData = { products: [] };
                }
                renderProducts();
            } catch (error) {
                showAlert('Error loading products: ' + error.message, 'error');
            }
        }

        function renderProducts() {
            const tbody = document.getElementById('productsBody');
            const products = productsData.products || [];

            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">No products yet. Click "Add Product" to get started.</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(p => `
                <tr>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.category}</td>
                    <td>₹${p.price}</td>
                    <td><span style="background: ${p.stock < 10 ? '#fff3cd' : '#d4edda'}; padding: 4px 8px; border-radius: 4px;">${p.stock}</span></td>
                    <td><span style="color: ${p.status === 'Active' ? 'green' : 'red'};">● ${p.status}</span></td>
                    <td class="action-buttons">
                        <button class="btn-secondary" onclick="editProduct(${p.id})">✏️ Edit</button>
                        <button class="btn-danger" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function reloadProducts() {
            loadProducts();
        }

        // ========== MODAL ==========
        function openAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('productForm').reset();
            document.getElementById('productModal').classList.add('active');
        }

        function editProduct(id) {
            const product = productsData.products.find(p => p.id === id);
            if (!product) return;

            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('productName').value = product.name;
            document.getElementById('productCategory').value = product.category;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productDescription').value = product.description;
            document.getElementById('productImage').value = product.image;
            document.getElementById('productStock').value = product.stock;
            document.getElementById('productStatus').value = product.status;
            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            currentEditId = null;
        }

        async function saveProduct(event) {
            event.preventDefault();

            if (!GITHUB_TOKEN) {
                showAlert('GitHub token not set. Please configure in Settings.', 'error');
                return;
            }

            const formData = {
                name: document.getElementById('productName').value,
                category: document.getElementById('productCategory').value,
                price: parseFloat(document.getElementById('productPrice').value),
                description: document.getElementById('productDescription').value,
                image: document.getElementById('productImage').value,
                stock: parseInt(document.getElementById('productStock').value),
                status: document.getElementById('productStatus').value
            };

            if (currentEditId) {
                const product = productsData.products.find(p => p.id === currentEditId);
                if (product) {
                    Object.assign(product, formData);
                }
            } else {
                const newId = Math.max(0, ...productsData.products.map(p => p.id)) + 1;
                productsData.products.push({ id: newId, ...formData });
            }

            await saveToGitHub();
            closeModal();
            loadProducts();
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            if (!GITHUB_TOKEN) {
                showAlert('GitHub token not set. Please configure in Settings.', 'error');
                return;
            }

            productsData.products = productsData.products.filter(p => p.id !== id);
            await saveToGitHub();
            loadProducts();
        }

        // ========== GITHUB INTEGRATION ==========
        async function saveToGitHub() {
            try {
                // Get current file SHA
                const infoResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${PRODUCTS_PATH}`,
                    { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } }
                );

                let sha = '';
                if (infoResponse.ok) {
                    const info = await infoResponse.json();
                    sha = info.sha;
                }

                // Update file
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${PRODUCTS_PATH}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Update products from admin dashboard',
                            content: btoa(JSON.stringify(productsData, null, 2)),
                            sha: sha
                        })
                    }
                );

                if (response.ok) {
                    showAlert('Product saved successfully!', 'success');
                } else {
                    showAlert('Error saving to GitHub', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // ========== SETTINGS ==========
        function saveSettings(event) {
            event.preventDefault();
            const repo = document.getElementById('repoUrl').value;
            const token = document.getElementById('adminPassword').value; // Simplified

            if (repo) {
                // Extract username/repo from URL
                const match = repo.match(/github\.com\/(.+?)\/(.+?)(?:\.git)?$/);
                if (match) {
                    const fullRepo = `${match[1]}/${match[2]}`;
                    localStorage.setItem('githubRepo', fullRepo);
                    window.GITHUB_REPO = fullRepo;
                }
            }

            showAlert('Settings saved! (Note: For security, use GitHub personal access token)', 'success');
        }

        // ========== UTILITIES ==========
        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            const alertClass = type === 'success' ? 'alert-success' : type === 'error' ? 'alert-error' : 'alert-info';
            box.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;

            setTimeout(() => {
                box.innerHTML = '';
            }, 5000);
        }

        // ========== INIT ==========
        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            loadDashboard();
        });

        // Close modal on outside click
        window.onclick = (event) => {
            const modal = document.getElementById('productModal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
