<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambey Pooja Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #8B3A3A;
            --primary-dark: #6B2A2A;
            --accent: #D4AF37;
            --light: #F5F1E8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 25px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-actions a {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .header-actions a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .hero {
            text-align: center;
            padding: 60px 0;
        }

        .hero h1 {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .hero p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .hero-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 14px 30px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 58, 58, 0.3);
        }

        .section-title {
            text-align: center;
            font-size: 36px;
            color: var(--primary);
            margin: 50px 0 40px;
            font-weight: 700;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(139, 58, 58, 0.15);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.1);
        }

        .stock-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .stock-badge.low {
            background: #F39C12;
        }

        .stock-badge.high {
            background: #27AE60;
        }

        .product-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .product-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            flex: 1;
            line-height: 1.5;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 58, 58, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 60px;
        }

        footer p {
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            .section-title {
                font-size: 24px;
            }

            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                🙏 Ambey Pooja Store
            </div>
            <div class="header-actions">
                <a href="login.html" target="_blank">🔐 Admin</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1>Welcome to Ambey Pooja Store</h1>
            <p>Sacred essentials for your spiritual journey</p>
        </div>

        <h2 class="section-title">Our Products</h2>

        <div id="productsContainer" class="products-grid">
            <div style="grid-column: 1 / -1; text-align: center; padding: 60px 20px;">
                <div class="loading" style="margin: 0 auto; margin-bottom: 20px;"></div>
                <p>Loading products...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Ambey Pooja Store. All rights reserved. 🙏</p>
    </footer>

    <script>
        const GITHUB_REPO = 'your-username/ambeypoojastore'; // Change this!
        const PRODUCTS_PATH = 'poojastore/products.json';

        async function loadAndDisplayProducts() {
            try {
                const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_REPO}/main/${PRODUCTS_PATH}`);
                if (!response.ok) {
                    throw new Error('Failed to load products');
                }

                const data = await response.json();
                const products = data.products || [];

                const container = document.getElementById('productsContainer');

                if (products.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1 / -1;">
                            <div class="empty-state">
                                <div class="empty-state-icon">📦</div>
                                <h2>No Products Available</h2>
                                <p>Check back soon for our sacred essentials!</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = products
                    .filter(p => p.status === 'Active')
                    .map(product => `
                        <div class="product-card">
                            <div class="product-image">
                                <img src="${product.image || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Crect fill=%22%23e0e0e0%22 width=%22300%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%23999%22 font-family=%22Arial%22 font-size=%2216%22%3ENo Image%3C/text%3E%3C/svg%3E'}" alt="${product.name}" onerror="this.style.display='none'">
                                <div class="stock-badge ${product.stock < 10 ? 'low' : 'high'}">
                                    ${product.stock < 10 ? '⚠️ Low Stock' : '✓ In Stock'}
                                </div>
                            </div>
                            <div class="product-info">
                                <div class="product-category">${product.category}</div>
                                <h3 class="product-name">${product.name}</h3>
                                <p class="product-description">${product.description}</p>
                                <div class="product-price">₹${product.price}</div>
                                <div class="product-actions">
                                    <button class="btn btn-primary" onclick="addToCart('${product.name}', ${product.price})">🛒 Buy Now</button>
                                    <button class="btn btn-secondary" onclick="viewDetails(${product.id})">ℹ️ Details</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
            } catch (error) {
                document.getElementById('productsContainer').innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            <h2>Unable to Load Products</h2>
                            <p>Error: ${error.message}</p>
                            <p style="margin-top: 10px; font-size: 12px; color: #ccc;">Make sure products.json is available and the GitHub repository URL is configured.</p>
                        </div>
                    </div>
                `;
            }
        }

        function addToCart(productName, price) {
            alert(`Added "${productName}" (₹${price}) to cart!\n\nNote: Cart feature coming soon.`);
        }

        function viewDetails(productId) {
            alert(`Product #${productId} details coming soon!`);
        }

        // Load products on page load
        document.addEventListener('DOMContentLoaded', loadAndDisplayProducts);
    </script>
</body>
</html>
